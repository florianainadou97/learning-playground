apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketplace-backend-deployment
  namespace: marketplace
  labels:
    app: marketplace-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketplace-backend
  template:
    metadata:
      labels:
        app: marketplace-backend
    spec:
      containers:
        - name: marketplace-backend
          image: marketplace-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: DB_URL
              value: jdbc:postgresql://marketplace-db-service:{{ .Values.postgres.port }}/{{ .Values.postgres.dbName }}
            - name: DB_PASSWORD
              value: {{ .Values.postgres.password }}
            - name: DB_USERNAME
              value: {{ .Values.postgres.username }}
            - name: DB_NAME
              value: "marketplace-backend"

---
apiVersion: v1
kind: Service
metadata:
  name: marketplace-backend
  namespace: marketplace
spec:
  type: LoadBalancer
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
  selector:
    app: marketplace-backend