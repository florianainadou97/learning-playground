apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketplace-backend-deployment
  namespace: marketplace
  labels:
    app: marketplace-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketplace-backend
  template:
    metadata:
      labels:
        app: marketplace-backend
    spec:
      containers:
        - name: marketplace-backend
          image: marketplace-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8282
          env:
            - name: DB_URL
              value: "jdbc:postgresql://marketplace-db-service:5432/marketplace-backend"
            - name: DB_PASSWORD
              value: "postgres"
            - name: DB_USERNAME
              value: "postgres"
            - name: DB_NAME
              value: "marketplace-backend"

---
apiVersion: v1
kind: Service
metadata:
  name: marketplace-backend
  namespace: marketplace
spec:
  type: LoadBalancer
  ports:
    - port: 8282
      targetPort: 8282
  selector:
    app: marketplace-backend